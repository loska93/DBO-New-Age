<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Postacie - DBO New Age</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background-image: url('../background.png') !important; background-attachment: fixed !important; background-position: center center !important; background-size: cover !important; background-repeat: no-repeat !important; }
        
        .class-section { margin-bottom: 40px; text-align: center; }
        .class-title { color: #ff9800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #ff9800; display: inline-block; padding: 0 20px; }
        
        .chars-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 80px)); 
            gap: 15px; 
            justify-content: center; 
            margin-top: 15px; 
        }
        
        .char-tile { 
            background: rgba(0,0,0,0.6); 
            border: 2px solid #333; 
            border-radius: 6px; 
            width: 80px; 
            height: 80px; 
            cursor: pointer; 
            transition: 0.2s; 
            overflow: hidden; 
        }
        
        .char-tile:hover, .char-tile.selected { border-color: #ff9800; transform: scale(1.1); box-shadow: 0 0 10px #ff9800; }
        .char-tile img { width: 100%; height: 100%; object-fit: cover; }
        
        .desc-container { max-width: 800px; margin: 0 auto; }
        .desc-box { display: none; background: rgba(0,0,0,0.85); padding: 25px; border-left: 4px solid #ff9800; margin-top: 20px; color: #fff; border-radius: 0 8px 8px 0; text-align: left; }
        .desc-box.active { display: block; }
    </style>
</head>
<body>
<div class="content-wrapper">
    <a href="../index.html" class="back-btn">&larr; Powrót</a>
    <h2>Wybierz Postać</h2>

    <div class="class-section">
        <h3 class="class-title">DPS</h3>
        <div class="chars-grid">
            <div class="char-tile" id="tile-gohan" onclick="showChar('gohan')"><img src="Gohan.png" alt="Gohan"></div>
            <div class="char-tile" id="tile-gotenks" onclick="showChar('gotenks')"><img src="gotenks.png" alt="Gotenks"></div>
            <div class="char-tile" id="tile-goku" onclick="showChar('goku')"><img src="Goku.png" alt="Goku"></div>
            <div class="char-tile" id="tile-vegeta" onclick="showChar('vegeta')"><img src="Vegeta.png" alt="Vegeta"></div>
            <div class="char-tile" id="tile-c17" onclick="showChar('c17')"><img src="C17.png" alt="C17"></div>
            <div class="char-tile" id="tile-trunks" onclick="showChar('trunks')"><img src="Trunks.png" alt="Trunks"></div>
            <div class="char-tile" id="tile-bergamo" onclick="showChar('bergamo')"><img src="Bergamo.png" alt="Bergamo"></div>
            <div class="char-tile" id="tile-c18" onclick="showChar('c18')"><img src="C18.png" alt="C18"></div>
            <div class="char-tile" id="tile-uub" onclick="showChar('uub')"><img src="Uub.png" alt="Uub"></div>
            <div class="char-tile" id="tile-tsuful" onclick="showChar('tsuful')"><img src="Tsuful.png" alt="Tsuful"></div>
            <div class="char-tile" id="tile-kuririn" onclick="showChar('kuririn')"><img src="Kuririn.png" alt="Kuririn"></div>
        </div>
    </div>

    <div class="desc-container">
        <div id="gohan" class="desc-box"><h3>Gohan</h3><p>Opis Gohana...</p></div>
        <div id="goku" class="desc-box"><h3>Goku</h3><p>Opis Goku...</p></div>
        </div>
</div>

<script>
    function showChar(id) {
        // Usuń podświetlenie ze wszystkich kafelków
        document.querySelectorAll('.char-tile').forEach(tile => tile.classList.remove('selected'));
        // Dodaj do klikniętego
        document.getElementById('tile-' + id).classList.add('selected');
        
        // Ukryj wszystkie opisy
        document.querySelectorAll('.desc-box').forEach(box => box.classList.remove('active'));
        // Pokaż wybrany
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
