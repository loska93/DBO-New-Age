<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Postacie - WIKI</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        html { scroll-behavior: smooth; } /* Płynne przewijanie */
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin: 30px 0;
        }
        .char-tile {
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            aspect-ratio: 1/1;
            transition: 0.2s;
        }
        .char-tile:hover { border-color: #ff9800; transform: scale(1.05); }
        .char-tile img { width: 100%; height: 100%; object-fit: cover; }

        .char-desc {
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #222;
            min-height: 200px;
        }
    </style>
</head>
<body>
<div class="content-wrapper">
    <a href="../index.html" class="back-btn">&larr; Powrót</a>
    <h2>Wybierz Postać</h2>

    <div class="grid-container">
        <a href="#goku" class="char-tile"><img src="avatars/goku.png" alt="Goku"></a>
        <a href="#vegeta" class="char-tile"><img src="avatars/vegeta.png" alt="Vegeta"></a>
        <a href="#gohan" class="char-tile"><img src="avatars/gohan.png" alt="Gohan"></a>
    </div>

    <div id="goku" class="char-desc">
        <h3>Goku</h3>
        <p>Opis postaci Goku po polsku...</p>
    </div>
    <div id="vegeta" class="char-desc">
        <h3>Vegeta</h3>
        <p>Opis postaci Vegeta po polsku...</p>
    </div>
</div>
</body>
</html>
