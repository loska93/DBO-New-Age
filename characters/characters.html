<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Postacie - DBO New Age</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background-image: url('../background.png') !important; background-attachment: fixed !important; background-position: center center !important; background-size: cover !important; background-repeat: no-repeat !important; }
        
        .class-section { margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .chars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; }
        
        .char-tile { background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 6px; aspect-ratio: 1/1; cursor: pointer; transition: 0.2s; overflow: hidden; }
        .char-tile:hover, .char-tile.selected { border-color: #ff9800; transform: scale(1.05); }
        .char-tile img { width: 100%; height: 100%; object-fit: cover; }
        
        .desc-box { display: none; background: rgba(0,0,0,0.85); padding: 25px; border-left: 4px solid #ff9800; margin-top: 20px; color: #fff; border-radius: 0 8px 8px 0; }
        .desc-box.active { display: block; }
        .class-title { color: #ff9800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #ff9800; display: inline-block; }
    </style>
</head>
<body>
<div class="content-wrapper">
    <a href="../index.html" class="back-btn">&larr; Powrót</a>
    <h2>Wybierz Postać</h2>

    <div class="class-section">
        <h3 class="class-title">DPS</h3>
        <div class="chars-grid">
            <div class="char-tile" id="tile-gohan" onclick="showChar('gohan')"><img src="Gohan.png" alt="Gohan"></div>
            <div class="char-tile" id="tile-gotenks" onclick="showChar('gotenks')"><img src="gotenks.png" alt="Gotenks"></div>
            <div class="char-tile" id="tile-goku" onclick="showChar('goku')"><img src="Goku.png" alt="Goku"></div>
            <div class="char-tile" id="tile-vegeta" onclick="showChar('vegeta')"><img src="Vegeta.png" alt="Vegeta"></div>
            <div class="char-tile" id="tile-c17" onclick="showChar('c17')"><img src="C17.png" alt="C17"></div>
            <div class="char-tile" id="tile-trunks" onclick="showChar('trunks')"><img src="Trunks.png" alt="Trunks"></div>
            <div class="char-tile" id="tile-bergamo" onclick="showChar('bergamo')"><img src="Bergamo.png" alt="Bergamo"></div>
            <div class="char-tile" id="tile-c18" onclick="showChar('c18')"><img src="C18.png" alt="C18"></div>
            <div class="char-tile" id="tile-uub" onclick="showChar('uub')"><img src="Uub.png" alt="Uub"></div>
            <div class="char-tile" id="tile-tsuful" onclick="showChar('tsuful')"><img src="Tsuful.png" alt="Tsuful"></div>
            <div class="char-tile" id="tile-kuririn" onclick="showChar('kuririn')"><img src="Kuririn.png" alt="Kuririn"></div>
        </div>
    </div>

    <div class="class-section">
        <h3 class="class-title">DPS PREMIUM</h3>
        <div class="chars-grid">
            <div class="char-tile" id="tile-moro" onclick="showChar('moro')"><img src="Moro.png" alt="Moro"></div>
            <div class="char-tile" id="tile-shenron" onclick="showChar('shenron')"><img src="Shenron.png" alt="Shenron"></div>
            <div class="char-tile" id="tile-vegetto" onclick="showChar('vegetto')"><img src="Vegetto.png" alt="Vegetto"></div>
            <div class="char-tile" id="tile-tapion" onclick="showChar('tapion')"><img src="Tapion.png" alt="Tapion"></div>
            <div class="char-tile" id="tile-king_vegeta" onclick="showChar('king_vegeta')"><img src="KingVegeta.png" alt="King Vegeta"></div>
            <div class="char-tile" id="tile-jiren" onclick="showChar('jiren')"><img src="Jiren.png" alt="Jiren"></div>
            <div class="char-tile" id="tile-bills" onclick="showChar('bills')"><img src="Bills.png" alt="Bills"></div>
            <div class="char-tile" id="tile-goku_black" onclick="showChar('goku_black')"><img src="GokuBlack.png" alt="Goku Black"></div>
        </div>
    </div>

    <div class="class-section">
        <h3 class="class-title">Tank</h3>
        <div class="chars-grid">
            <div class="char-tile" id="tile-raditz" onclick="showChar('raditz')"><img src="Raditz.png" alt="Raditz"></div>
            <div class="char-tile" id="tile-turles" onclick="showChar('turles')"><img src="Turles.png" alt="Turles"></div>
            <div class="char-tile" id="tile-piccolo" onclick="showChar('piccolo')"><img src="Piccolo.png" alt="Piccolo"></div>
            <div class="char-tile" id="tile-cell" onclick="showChar('cell')"><img src="Cell.png" alt="Cell"></div>
            <div class="char-tile" id="tile-boo" onclick="showChar('boo')"><img src="Boo.png" alt="Boo"></div>
            <div class="char-tile" id="tile-broly" onclick="showChar('broly')"><img src="Brolly.png" alt="Broly"></div>
        </div>
    </div>

    <div class="class-section">
        <h3 class="class-title">Tank PREMIUM</h3>
        <div class="chars-grid">
            <div class="char-tile" id="tile-kagome" onclick="showChar('kagome')"><img src="Kagome.png" alt="Kagome"></div>
            <div class="char-tile" id="tile-zaiko" onclick="showChar('zaiko')"><img src="Zaiko.png" alt="Zaiko"></div>
            <div class="char-tile" id="tile-android21" onclick="showChar('android21')"><img src="C21.png" alt="Android 21"></div>
        </div>
    </div>

    <div class="class-section">
        <h3 class="class-title">Support</h3>
        <div class="chars-grid">
            <div class="char-tile" id="tile-freeza" onclick="showChar('freeza')"><img src="Freeza.png" alt="Freeza"></div>
            <div class="char-tile" id="tile-cooler" onclick="showChar('cooler')"><img src="Cooler.png" alt="Cooler"></div>
            <div class="char-tile" id="tile-dende" onclick="showChar('dende')"><img src="Dende.png" alt="Dende"></div>
            <div class="char-tile" id="tile-kaioshin" onclick="showChar('kaioshin')"><img src="Kaiohshin.png" alt="Kaioshin"></div>
            <div class="char-tile" id="tile-janemba" onclick="showChar('janemba')"><img src="Janemba.png" alt="Janemba"></div>
            <div class="char-tile" id="tile-tenshinhan" onclick="showChar('tenshinhan')"><img src="tenshinhan.png" alt="Tenshinhan"></div>
        </div>
    </div>

    <div class="class-section">
        <h3 class="class-title">Support PREMIUM</h3>
        <div class="chars-grid">
            <div class="char-tile" id="tile-kame" onclick="showChar('kame')"><img src="Kame.png" alt="Mestre Kame"></div>
            <div class="char-tile" id="tile-chilled" onclick="showChar('chilled')"><img src="Chilled.png" alt="Chilled"></div>
            <div class="char-tile" id="tile-zamasu" onclick="showChar('zamasu')"><img src="Zamasu.png" alt="Zamasu"></div>
        </div>
    </div>

    </div>

<script>
    function showChar(id) {
        document.querySelectorAll('.char-tile').forEach(tile => tile.classList.remove('selected'));
        document.getElementById('tile-' + id).classList.add('selected');
        document.querySelectorAll('.desc-box').forEach(box => box.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
