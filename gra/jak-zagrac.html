<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jak zagrać? - DBO New Age</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background-image: url('../background.png') !important;
            background-attachment: fixed !important;
            background-position: center center !important;
            background-size: cover !important;
            background-repeat: no-repeat !important;
        }
    </style>
</head>
<body>

<div class="content-wrapper">
    <a href="../index.html" class="back-btn">&larr; Powrót</a>
    
    <h2 style="text-align: center;">Jak zagrać w DBO New Age?</h2>
    <p style="text-align: center;">Kliknij na dowolny obrazek, aby go powiększyć.</p>

    <div class="gallery-container">
        <div class="img-box item1" onclick="openLightbox('1.png')"><img src="1.png"><p>Ekran Logowania</p></div>
        <div class="img-box item2" onclick="openLightbox('2.png')"><img src="2.png"><p>Tworzenie</p></div>
        <div class="img-box item3" onclick="openLightbox('3.png')"><img src="3.png"><p>Zmiana</p></div>
        <div class="img-box item4" onclick="openLightbox('4.png')"><img src="4.png"><p>Odzyskiwanie</p></div>
        <div class="img-box item5" onclick="openLightbox('5.png')"><img src="5.png"><p>Wybór Postaci</p></div>
    </div>
</div> <div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="Powiększenie">
</div>

<script>
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
</script>

</body>
</html>
