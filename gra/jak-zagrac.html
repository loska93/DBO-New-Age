<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jak zagrać? - DBO New Age</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background-image: url('../background.png') !important;
            background-attachment: fixed !important;
            background-position: center center !important;
            background-size: cover !important;
            background-repeat: no-repeat !important;
        }

        /* Układ galerii zgodny z Twoim projektem */
        .gallery-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 15px;
            margin-top: 20px;
        }

        .main-left { grid-column: 1 / 2; grid-row: 1 / 3; }
        .top-right { grid-column: span 1; }
        .bottom-right { grid-column: 2 / 5; }

        .gallery-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .gallery-container img:hover {
            border-color: #ff9800;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<div class="content-wrapper">
    <a href="../index.html" class="back-btn">&larr; Powrót</a>
    
    <h2 style="text-align: center;">Jak zagrać w DBO New Age?</h2>
    <p style="text-align: center;">Zapoznaj się z poniższym przewodnikiem, który pokaże Ci proces instalacji i rozpoczęcia przygody na naszym serwerze.</p>

    <div class="gallery-container">
        <div class="main-left"><img src="1.png" alt="Instalacja"></div>
        
        <div class="top-right"><img src="2.jpg" alt="Konto"></div>
        <div class="top-right"><img src="3.jpg" alt="Logowanie"></div>
        <div class="top-right"><img src="4.jpg" alt="Konfiguracja"></div>
        
        <div class="bottom-right"><img src="5.jpg" alt="Start gry"></div>
    </div>
</div>

</body>
</html>
