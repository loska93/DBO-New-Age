<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jak zagrać? - DBO New Age</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background-image: url('../background.png') !important;
            background-attachment: fixed !important;
            background-position: center center !important;
            background-size: cover !important;
            background-repeat: no-repeat !important;
        }
    </style>
</head>
<body>

<div class="content-wrapper">
    <a href="../index.html" class="back-btn">&larr; Powrót</a>
    
    <h2 style="text-align: center;">Jak zagrać w DBO New Age?</h2>
    <p style="text-align: center;">Kliknij na dowolny obrazek, aby go powiększyć.</p>

    <div class="gallery-container">
        <div class="img-box" onclick="openLightbox('1.png')">
            <img src="1.png" alt="Ekran Logowania">
            <p>Ekran Logowania</p>
        </div>
        
        <div class="right-side">
            <div class="img-box" onclick="openLightbox('2.jpg')">
                <img src="2.jpg" alt="Tworzenie Konta">
                <p>Tworzenie Konta</p>
            </div>
            <div class="img-box" onclick="openLightbox('3.jpg')">
                <img src="3.jpg" alt="Zmiana Hasła">
                <p>Zmiana Hasła</p>
            </div>
            <div class="img-box" onclick="openLightbox('4.jpg')">
                <img src="4.jpg" alt="Odzyskiwanie">
                <p>Odzyskiwanie</p>
            </div>
            <div class="img-box" onclick="openLightbox('5.jpg')" style="grid-column: span 3;">
                <img src="5.jpg" alt="Wybór Postaci">
                <p>Wybór Postaci</p>
            </div>
        </div>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="Powiększenie">
</div>

<script>
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
</script>

</body>
</html>
